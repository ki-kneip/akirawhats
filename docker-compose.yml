services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: akirawhats
      API_KEY: ${API_KEY:-}
    volumes:
      - wa_data:/app/data
    depends_on:
      - mongo

volumes:
  mongo_data:
  wa_data:
