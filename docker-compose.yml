services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?MONGO_ROOT_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?MONGO_ROOT_PASSWORD is required}
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/?authSource=admin
      MONGO_DB: ${MONGO_DB:-akirawhats}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required (mínimo 32 chars)}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?ADMIN_EMAIL is required}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      API_KEY: ${API_KEY:-}
    volumes:
      - wa_data:/app/data
    depends_on:
      - mongo

  web:
    build: ./web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
    depends_on:
      - app

volumes:
  mongo_data:
  wa_data:
